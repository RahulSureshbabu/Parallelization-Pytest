version: "3.9"
services:
  api:
    build:
      context: ./my-api
    ports:
      - "3000:3000"

  tests:
    image: python:3.13-slim
    depends_on:
      - api
    working_dir: /app
    environment:
      - API_BASE=http://api:3000   # run tests against docker-compose network API service
    volumes:
      - .:/app:rw
    command: /bin/sh -c "pip install -r requirements.txt && pytest -q --junitxml=results.xml"

# NOTE: The server fixture in tests/api_test.py is commented out under option A,
# because the api service is started by docker-compose (in contrast to local Windows bat start).
# Added junitxml output so test reports are persisted to ./results.xml (in mounted repo).
